# Hyprlock configuration file
# ~/.config/hypr/hyprlock.conf

# General settings
general {
    hide_cursor = true
    grace = 500  # Grace period in seconds before the lock screen activates
}

animations {
    enabled = true
    
    # A smooth, organic easing curve (easeOutCubic style)
    bezier = softCurve, 0.25, 1, 0.5, 1
    
    # Increased duration slightly to 0.8 seconds for a relaxed feel
    animation = fadein, 1, 0.8, softCurve
}

auth {
    pam {
        enabled = true
    }
}

# 1. Base Layer: Sharp, crisp full-screen image
background {
    monitor =
    path = ~/pictures/wallpapers/hagiasophia.png
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 0 # No full screen blur
    zindex = -2
}


# Shape to cover wallpaper and increase text readability
shape {
    monitor = 
    size = 600, 500                    # Fits clock, date, username, and input field
    # (Updated Opacity) Increased from 0.3 to 0.75 for a more solid, opaque background
    color = rgba(60, 80, 100, 0.75)
    blur_passes = 4
    blur_size = 100
    rounding = 15                      # Uniform rounded corners
    # (New Vibrant Accent) Golden-peach border pulled from the background sky
    border_color = rgba(255, 220, 160, 0) 
    position = 0, -50                  # Centered behind the text stack
    halign = center
    valign = center
    xray = false
	border_size = 0
}


# Input field configuration
input-field {
    monitor =  # Leave empty for all monitors
    size = 300, 40  
    position = 0, -225  # (Updated Spacing) Shifted up from -135 to close the gap further
    outline_thickness = 1
    dots_size = 0.33  
    dots_spacing = 0.15  
    dots_center = true
    # (New Sleek Accent) Rich amber-gold outer ring
    outer_color = rgba(210, 180, 130, 0.8)
    # (New Sleek) Translucent deep blue-grey field to make text crisp
    inner_color = rgba(30, 40, 50, 0.9)    
    # (New Minimal) Clean light cream font color
    font_color = rgb(250, 250, 240)        
    font_family = JetBrains Mono Nerd Font Bold
    fade_on_empty = false
    # Wrapped in a span tag to force the font size to 14pt
    placeholder_text = <span size="14pt"><i> Enter Password</i></span>  
    hide_input = false
    rounding = -1
}

# User background shape (Styled identically to input-field)
shape {
    monitor =
    size = 300, 40
    color = rgba(30, 40, 50, 0.9)          # Matches new sleek deep blue-grey
    border_size = 1                        # Matches input-field outline_thickness
    # Matches input-field outer_color (Rich amber-gold ring)
    border_color = rgba(210, 180, 130, 0.8) 
    rounding = 8
    position = 0, -175  
    halign = center
    valign = center
    rounding = -1
}

# User label 
label {
    monitor =  # Leave empty for all monitors
    text =  $USER  
    # (New Minimal) Matches new input-field font_color
    color = rgb(250, 250, 240)             
    font_size = 14  # Size adjusted to 14
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, -175  
    halign = center
    valign = center
}

# Date format configuration 
label {
    monitor =  # Leave empty for all monitors
    text = cmd[update:1000] echo "$(date "+%A, %d %B %Y")"
    # (New Minimal) Minimal light cream color
    color = rgba(255, 220, 160, 1.0) 
	#color = rgba(250, 250, 240, 1.0) 
    font_size = 20
    font_family = JetBrains Mono Nerd Font
    position = 0, 95  # Moved to the top of the stack
    halign = center
    valign = center
}

# Clock/time format configuration 
label {
    monitor =  # Leave empty for all monitors
    text = cmd[update:1000] echo "$(date "+%H:%M")" # Removed :%S
    # (New Vibrant Accent) Clock text uses the rich golden-peach accent
    color = rgba(255, 220, 160, 1.0) 
    font_size = 70  # Increased from 50 to 70 for emphasis
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 20  # Shifted down below the date
    halign = center
    valign = center
}
